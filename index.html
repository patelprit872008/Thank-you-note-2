<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎂 Happy Birthday Eman | Love Forever ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Dancing+Script:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0515 100%);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Panel */
        .ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }

        .cut-btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #e8897a, #d45a6e, #b83a52);
            border: none;
            padding: 16px 42px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .cut-btn:hover { transform: scale(1.05); }
        .cut-btn:disabled { opacity: 0.6; cursor: not-allowed; animation: none; }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 10px 45px rgba(184,58,82,0.5); }
        }

        /* Butterfly Button */
        .butterfly-btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #7b2cbf, #9d4edd, #c77dff);
            border: none;
            padding: 14px 38px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 25px rgba(157,78,221,0.4);
            transition: all 0.3s;
            margin-top: 15px;
            display: none;
        }
        
        .butterfly-btn:hover { transform: scale(1.03); background: linear-gradient(135deg, #9d4edd, #c77dff); }

        /* Love Message Card */
        .love-card {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px 25px;
            text-align: center;
            animation: slideDown 0.6s ease;
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 280px;
        }

        .love-card .greeting { 
            font-size: 1rem; 
            color: #FFB7C5;
            letter-spacing: 1px;
        }
        
        .love-card .name { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #FFD6E8, #FF9EAA); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            margin: 5px 0;
        }
        
        .love-card .sweet-message {
            font-size: 0.85rem;
            color: #e8d0e0;
            margin-top: 8px;
            line-height: 1.4;
            font-style: italic;
        }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Blow Instruction */
        .blow-instruction {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            color: #FFD6E8;
            font-size: 0.9rem;
            z-index: 20;
            pointer-events: none;
            animation: bounce 1s infinite;
            white-space: nowrap;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Message Popups */
        .message-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        .popup-content {
            background: linear-gradient(145deg, #2a1a2e, #1a0a1e);
            border-radius: 60px;
            padding: 45px 40px;
            text-align: center;
            max-width: 550px;
            border: 1px solid rgba(255, 158, 170, 0.5);
            box-shadow: 0 0 60px rgba(184,58,82,0.3);
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .popup-content h1 { 
            font-size: 2.5rem; 
            font-family: 'Dancing Script', cursive; 
            background: linear-gradient(135deg, #FFD6E8, #FF9EAA); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent;
            margin: 15px 0;
        }
        
        .popup-content .message-text { 
            font-size: 1.15rem; 
            margin: 25px 0; 
            line-height: 1.6; 
            color: #ffe0e7; 
        }
        
        .popup-content .from-name { 
            font-size: 1.5rem; 
            font-family: 'Dancing Script', cursive; 
            color: #FFB7C5; 
            margin-top: 10px;
        }
        
        .popup-close { 
            background: linear-gradient(95deg, #d45a6e, #b83a52); 
            border: none; 
            padding: 12px 35px; 
            font-size: 1rem; 
            font-weight: bold; 
            border-radius: 50px; 
            color: white; 
            cursor: pointer; 
            margin-top: 20px;
            transition: all 0.2s;
        }
        
        .popup-close:hover { transform: scale(1.02); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Music Control */
        .music-control {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 18px;
            cursor: pointer;
            color: #FFB7C5;
            font-size: 0.8rem;
            pointer-events: auto;
            font-weight: 500;
            transition: 0.2s;
        }
        
        .music-control:hover { background: rgba(0,0,0,0.7); }

        /* Final Love Badge */
        .final-love-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.8rem;
            color: #FFB7C5;
            font-family: 'Dancing Script', cursive;
            font-weight: 600;
            letter-spacing: 1px;
        }

        @media (max-width: 700px) {
            .cut-btn { padding: 12px 30px; font-size: 1.1rem; }
            .butterfly-btn { padding: 10px 30px; font-size: 1rem; }
            .popup-content { margin: 20px; padding: 30px 25px; }
            .popup-content h1 { font-size: 1.8rem; }
            .blow-instruction { font-size: 0.7rem; bottom: 100px; white-space: nowrap; }
            .love-card { padding: 10px 18px; max-width: 240px; }
            .love-card .name { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="love-card">
    <div class="greeting">💕 My Forever Love 💕</div>
    <div class="name">Eman</div>
    <div class="sweet-message">"Every day with you feels like a beautiful dream. You are my sunshine, my peace, and my greatest adventure."</div>
</div>

<div class="ui-panel">
    <button class="cut-btn" id="cutCakeBtn">🔪 CUT THE CAKE 🎂</button>
    <button class="butterfly-btn" id="butterflyBtn">🦋 Release Butterflies 🦋</button>
</div>

<div class="blow-instruction" id="blowInstruction">
    💨 Click on the candle flames to blow them! 💨
</div>

<div class="music-control" id="musicControl">
    🎵 Play Music
</div>

<div class="final-love-badge" id="finalLoveBadge" style="display: none;">
    ✨ Be Loved Eman, From Your Be Loved Prit ✨
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    
    // --- Setup Scene ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.006);
    
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5.5, 3.8, 8.5);
    camera.lookAt(0, 1.6, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // Postprocessing
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.2, 0.6);
    bloomPass.threshold = 0.2;
    bloomPass.strength = 0.4;
    const effectComposer = new EffectComposer(renderer);
    effectComposer.addPass(renderScene);
    effectComposer.addPass(bloomPass);
    
    // CSS2D Renderer
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);
    
    // --- Music ---
    let bgMusic = null;
    let isMusicPlaying = false;
    
    function initMusic() {
        bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4;
    }
    
    function playMusic() {
        if (bgMusic && !isMusicPlaying) {
            bgMusic.play().catch(e => console.log('Audio play blocked'));
            isMusicPlaying = true;
            document.getElementById('musicControl').innerHTML = '🎵 Music On 🎵';
        }
    }
    
    function stopMusic() {
        if (bgMusic && isMusicPlaying) {
            bgMusic.pause();
            isMusicPlaying = false;
            document.getElementById('musicControl').innerHTML = '🎵 Play Music';
        }
    }
    
    document.getElementById('musicControl').addEventListener('click', () => {
        if (!bgMusic) initMusic();
        if (isMusicPlaying) stopMusic();
        else playMusic();
    });
    
    // --- Realistic Lighting ---
    const ambientLight = new THREE.AmbientLight(0x3a3a5a, 0.6);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffeedd, 1.0);
    mainLight.position.set(4, 6, 3);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0xffaa99, 0.5);
    fillLight.position.set(-2, 3, 4);
    scene.add(fillLight);
    
    const rimLight = new THREE.PointLight(0xffaa88, 0.4);
    rimLight.position.set(0, 2.5, -4);
    scene.add(rimLight);
    
    const warmFill = new THREE.PointLight(0xff9966, 0.35);
    warmFill.position.set(2, 1.5, 2);
    scene.add(warmFill);
    
    // Table surface
    const tablePlane = new THREE.Mesh(
        new THREE.CylinderGeometry(3.5, 3.5, 0.1, 32),
        new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7, metalness: 0.1 })
    );
    tablePlane.position.y = -0.25;
    tablePlane.receiveShadow = true;
    tablePlane.castShadow = true;
    scene.add(tablePlane);
    
    const gridHelper = new THREE.GridHelper(12, 20, 0x8866aa, 0x442266);
    gridHelper.position.y = -0.3;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.15;
    scene.add(gridHelper);
    
    // Background Stars
    const starCount = 1200;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPos[i*3] = (Math.random() - 0.5) * 50;
        starPos[i*3+1] = (Math.random() - 0.5) * 12 + 1;
        starPos[i*3+2] = (Math.random() - 0.5) * 35 - 10;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starsField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffccdd, size: 0.04, transparent: true, opacity: 0.5 }));
    scene.add(starsField);
    
    // --- REALISTIC CAKE ---
    const cakeGroup = new THREE.Group();
    
    const spongeMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.65, metalness: 0.02 });
    const spongeMat2 = new THREE.MeshStandardMaterial({ color: 0xc9946a, roughness: 0.65, metalness: 0.02 });
    const spongeMat3 = new THREE.MeshStandardMaterial({ color: 0xbf885e, roughness: 0.65, metalness: 0.02 });
    
    const bottomTier = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.9, 0.58, 128), spongeMat);
    bottomTier.castShadow = true;
    bottomTier.receiveShadow = true;
    bottomTier.position.y = 0.29;
    cakeGroup.add(bottomTier);
    
    const middleTier = new THREE.Mesh(new THREE.CylinderGeometry(1.48, 1.52, 0.52, 128), spongeMat2);
    middleTier.castShadow = true;
    middleTier.receiveShadow = true;
    middleTier.position.y = 0.29 + 0.58;
    cakeGroup.add(middleTier);
    
    const topTier = new THREE.Mesh(new THREE.CylinderGeometry(1.12, 1.16, 0.52, 128), spongeMat3);
    topTier.castShadow = true;
    topTier.receiveShadow = true;
    topTier.position.y = 0.29 + 0.58 + 0.52;
    cakeGroup.add(topTier);
    
    const frostingMat = new THREE.MeshStandardMaterial({ color: 0xf5e6d3, roughness: 0.5, metalness: 0.02 });
    
    const frostingRing1 = new THREE.Mesh(new THREE.TorusGeometry(1.84, 0.09, 48, 200), frostingMat);
    frostingRing1.rotation.x = Math.PI / 2;
    frostingRing1.position.y = 0.29 + 0.58;
    cakeGroup.add(frostingRing1);
    
    const frostingRing2 = new THREE.Mesh(new THREE.TorusGeometry(1.52, 0.09, 48, 200), frostingMat);
    frostingRing2.rotation.x = Math.PI / 2;
    frostingRing2.position.y = 0.29 + 1.10;
    cakeGroup.add(frostingRing2);
    
    const frostingTop = new THREE.Mesh(new THREE.TorusGeometry(1.16, 0.09, 48, 200), frostingMat);
    frostingTop.rotation.x = Math.PI / 2;
    frostingTop.position.y = 0.29 + 1.62;
    cakeGroup.add(frostingTop);
    
    // Sprinkles
    const sprinkleColorsReal = [0x8B4513, 0xA0522D, 0xCD853F, 0xD2691E];
    for (let i = 0; i < 180; i++) {
        const sprinkle = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshStandardMaterial({ color: sprinkleColorsReal[Math.floor(Math.random() * sprinkleColorsReal.length)] }));
        let yLayer, radius;
        const r = Math.random();
        if (r < 0.34) { yLayer = 0.29 + 0.2; radius = 1.74; }
        else if (r < 0.67) { yLayer = 0.29 + 0.75; radius = 1.45; }
        else { yLayer = 0.29 + 1.27; radius = 1.10; }
        const angle = Math.random() * Math.PI * 2;
        const rad = radius * (0.8 + Math.random() * 0.4);
        sprinkle.position.x = Math.cos(angle) * rad;
        sprinkle.position.z = Math.sin(angle) * rad;
        sprinkle.position.y = yLayer + Math.random() * 0.1;
        sprinkle.castShadow = true;
        cakeGroup.add(sprinkle);
    }
    
    // Candles
    const candleMatReal = new THREE.MeshStandardMaterial({ color: 0xf0e0c0, roughness: 0.3 });
    const flameMatReal = new THREE.MeshStandardMaterial({ color: 0xff8833, emissive: 0xff4411, emissiveIntensity: 0.5 });
    
    const candlePositions = [
        [-0.6, 0.29 + 1.62 + 0.3, 0.5],
        [0.6, 0.29 + 1.62 + 0.3, 0.5],
        [0, 0.29 + 1.62 + 0.3, -0.7]
    ];
    
    const candles = [];
    const flamesList = [];
    
    candlePositions.forEach(pos => {
        const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.115, 0.58, 32), candleMatReal);
        candleBody.position.set(pos[0], pos[1], pos[2]);
        candleBody.castShadow = true;
        cakeGroup.add(candleBody);
        candles.push(candleBody);
        
        const flameGeo = new THREE.ConeGeometry(0.085, 0.16, 16);
        const flame = new THREE.Mesh(flameGeo, flameMatReal);
        flame.position.set(pos[0], pos[1] + 0.32, pos[2]);
        flame.castShadow = true;
        cakeGroup.add(flame);
        flamesList.push(flame);
    });
    
    scene.add(cakeGroup);
    
    // Floating Birthday Text
    const textDiv = document.createElement('div');
    textDiv.textContent = '✨ Happy Birthday Eman ✨';
    textDiv.style.cssText = 'color:#FFB7C5; font-size:28px; font-weight:600; text-shadow:0 0 15px rgba(0,0,0,0.3); font-family:Dancing Script, cursive; background:rgba(0,0,0,0.3); padding:8px 25px; border-radius:60px; backdrop-filter:blur(8px);';
    const floatingTitle = new CSS2DObject(textDiv);
    floatingTitle.position.set(0, 3.3, 0);
    scene.add(floatingTitle);
    
    // Knife
    const knifeGroup = new THREE.Group();
    const knifeBlade = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.35, 0.85), new THREE.MeshStandardMaterial({ color: 0xaaaacc, metalness: 0.85, roughness: 0.2 }));
    knifeBlade.position.set(0, 0.18, 0.42);
    knifeGroup.add(knifeBlade);
    const knifeHandle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.32), new THREE.MeshStandardMaterial({ color: 0x7a4a2a, roughness: 0.6 }));
    knifeHandle.position.set(0, 0.18, -0.22);
    knifeGroup.add(knifeHandle);
    knifeGroup.visible = false;
    scene.add(knifeGroup);
    
    // --- Butterflies Array ---
    const butterflies = [];
    
    function createButterfly(x, z) {
        const group = new THREE.Group();
        
        // Wings
        const wingColor = 0xff88aa;
        const wingMat = new THREE.MeshStandardMaterial({ color: wingColor, emissive: 0xff4466, emissiveIntensity: 0.3, transparent: true, opacity: 0.9 });
        
        const leftWing = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.35, 16), wingMat);
        leftWing.rotation.z = -0.5;
        leftWing.rotation.x = 0.3;
        leftWing.position.set(-0.22, 0, 0);
        group.add(leftWing);
        
        const rightWing = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.35, 16), wingMat);
        rightWing.rotation.z = 0.5;
        rightWing.rotation.x = 0.3;
        rightWing.position.set(0.22, 0, 0);
        group.add(rightWing);
        
        // Body
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
        body.position.y = -0.05;
        group.add(body);
        
        group.position.set(x, 1.2 + Math.random() * 1.5, z);
        group.castShadow = true;
        scene.add(group);
        
        return {
            mesh: group,
            angle: Math.random() * Math.PI * 2,
            speed: 0.02 + Math.random() * 0.02,
            radius: 1 + Math.random() * 3,
            yOffset: Math.random() * 2,
            wingAngle: 0
        };
    }
    
    function releaseButterflies() {
        const butterflyCount = 25;
        for (let i = 0; i < butterflyCount; i++) {
            setTimeout(() => {
                const angle = Math.random() * Math.PI * 2;
                const radius = 2 + Math.random() * 4;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const butterfly = createButterfly(x, z);
                butterflies.push(butterfly);
            }, i * 100);
        }
        
        // Show final love badge
        document.getElementById('finalLoveBadge').style.display = 'block';
    }
    
    // --- State ---
    let candlesBlown = false;
    let cakeCut = false;
    let blowMessageShown = false;
    
    // --- Show Blow Message ---
    function showBlowMessage() {
        if (blowMessageShown) return;
        blowMessageShown = true;
        
        const popup = document.createElement('div');
        popup.className = 'message-popup';
        popup.innerHTML = `
            <div class="popup-content">
                <div style="font-size: 4rem;">🕯️💨✨</div>
                <h1>You Blew the Candles! 🎂</h1>
                <div class="message-text">
                    🌟 "May all your wishes come true, my love! 🌟<br><br>
                    Just like these candles, you light up my world.<br>
                    Every day with you is a celebration.<br>
                    I wish you joy, laughter, and endless love."
                </div>
                <div class="from-name">💕 With Love, Prit 💕</div>
                <button class="popup-close" id="closeBlowMsg">❤️ Thank You My Love ❤️</button>
            </div>
        `;
        document.body.appendChild(popup);
        
        document.getElementById('closeBlowMsg').addEventListener('click', () => {
            popup.remove();
        });
    }
    
    // --- Blow Candles ---
    function blowCandles() {
        if (candlesBlown) return;
        candlesBlown = true;
        
        flamesList.forEach(flame => { flame.visible = false; });
        
        // Smoke effect
        for (let i = 0; i < 60; i++) {
            const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 6), new THREE.MeshStandardMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.4 }));
            smoke.position.set(
                (Math.random() - 0.5) * 1.5,
                2.0 + Math.random() * 0.8,
                (Math.random() - 0.5) * 1.5
            );
            scene.add(smoke);
            let life = 0;
            const interval = setInterval(() => {
                smoke.position.y += 0.03;
                smoke.scale.multiplyScalar(0.98);
                life++;
                if (life > 50) { clearInterval(interval); scene.remove(smoke); }
            }, 30);
        }
        
        document.getElementById('blowInstruction').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('blowInstruction').style.display = 'none';
        }, 500);
        
        showBlowMessage();
    }
    
    // --- Show Cake Cut Message ---
    function showCutMessage() {
        const popup = document.createElement('div');
        popup.className = 'message-popup';
        popup.innerHTML = `
            <div class="popup-content">
                <div style="font-size: 4.5rem;">🎂💖🔪✨</div>
                <h1>Happy Birthday My Beloved Eman!</h1>
                <div class="message-text">
                    🌹 "You are the most beautiful gift life has given me. 🌹<br><br>
                    Every moment with you feels like a dream.<br>
                    Today, on your birthday, I promise to always stand by you,<br>
                    to love you more with each passing day, and to make you smile forever.<br><br>
                    Thank you for being YOU. You are my everything."<br><br>
                    💍 I can't wait to celebrate all our birthdays together 💍
                </div>
                <div class="from-name">💕 Forever Yours 💕<br>~ Prit ~</div>
                <button class="popup-close" id="closeCutMsg">❤️ I Love You Endlessly ❤️</button>
            </div>
        `;
        document.body.appendChild(popup);
        
        document.getElementById('closeCutMsg').addEventListener('click', () => {
            popup.remove();
            createCelebrationEffects();
            // Show butterfly button after message closes
            document.getElementById('butterflyBtn').style.display = 'block';
        });
    }
    
    function createCelebrationEffects() {
        // Hearts
        for (let i = 0; i < 120; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random() * 5)];
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = '-50px';
                heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '2000';
                heart.style.animation = `heartRain 2.5s linear forwards`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 2500);
            }, i * 40);
        }
        
        // Confetti
        for (let i = 0; i < 150; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.innerHTML = ['🎉', '🎊', '✨', '🎂', '💖'][Math.floor(Math.random() * 5)];
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-20px';
                confetti.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '2000';
                confetti.style.animation = `confettiFall 1.8s ease-out forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }, i * 30);
        }
    }
    
    // --- Cake Cutting Animation ---
    async function performCut() {
        if (cakeCut) return;
        cakeCut = true;
        
        playMusic();
        
        knifeGroup.visible = true;
        knifeGroup.position.set(0.8, 1.5, 0.5);
        
        for (let i = 0; i < 28; i++) {
            const t = i / 28;
            knifeGroup.position.x = 0.8 - t * 1.6;
            knifeGroup.position.z = 0.5 - t * 0.7;
            knifeGroup.rotation.z = t * 0.7;
            await new Promise(r => setTimeout(r, 32));
        }
        
        knifeGroup.visible = false;
        
        bottomTier.visible = false;
        middleTier.visible = false;
        topTier.visible = false;
        frostingRing1.visible = false;
        frostingRing2.visible = false;
        frostingTop.visible = false;
        candles.forEach(c => c.visible = false);
        flamesList.forEach(f => f.visible = false);
        
        // Cake crumbs
        for (let i = 0; i < 350; i++) {
            const piece = new THREE.Mesh(new THREE.BoxGeometry(0.08 + Math.random() * 0.14, 0.07 + Math.random() * 0.12, 0.08 + Math.random() * 0.14), new THREE.MeshStandardMaterial({ color: 0xd4a574 }));
            piece.position.set((Math.random() - 0.5) * 2.8, 0.3 + Math.random() * 2.2, (Math.random() - 0.5) * 2.8);
            piece.castShadow = true;
            scene.add(piece);
            const vel = { x: (Math.random() - 0.5) * 0.22, y: Math.random() * 0.28 + 0.12, z: (Math.random() - 0.5) * 0.22 };
            let life = 0;
            const interval = setInterval(() => {
                piece.position.x += vel.x;
                piece.position.y += vel.y;
                piece.position.z += vel.z;
                vel.y -= 0.009;
                life++;
                if (life > 70) { clearInterval(interval); scene.remove(piece); }
            }, 16);
        }
        
        // Sparkles
        const sparkleCount = 800;
        const sparkleGeo = new THREE.BufferGeometry();
        const sparklePos = new Float32Array(sparkleCount * 3);
        for (let i = 0; i < sparkleCount; i++) {
            sparklePos[i*3] = (Math.random() - 0.5) * 3;
            sparklePos[i*3+1] = Math.random() * 2.5;
            sparklePos[i*3+2] = (Math.random() - 0.5) * 3;
        }
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
        const sparkles = new THREE.Points(sparkleGeo, new THREE.PointsMaterial({ color: 0xffaa77, size: 0.045, blending: THREE.AdditiveBlending }));
        scene.add(sparkles);
        setTimeout(() => scene.remove(sparkles), 900);
        
        setTimeout(() => showCutMessage(), 500);
        
        const burstLight = new THREE.PointLight(0xff6688, 1.8, 12);
        burstLight.position.set(0, 1.5, 0);
        scene.add(burstLight);
        setTimeout(() => scene.remove(burstLight), 1800);
    }
    
    // --- CSS Animations ---
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
        @keyframes heartRain { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(540deg); opacity: 0; } }
    `;
    document.head.appendChild(styleSheet);
    
    // --- Event Listeners ---
    document.getElementById('cutCakeBtn').addEventListener('click', () => {
        if (!candlesBlown) {
            alert('💨 First blow the candles! Click on the candle flames! 💨');
            return;
        }
        performCut();
        const btn = document.getElementById('cutCakeBtn');
        btn.disabled = true;
        btn.textContent = '🎉 CAKE CUT! 🎉';
    });
    
    document.getElementById('butterflyBtn').addEventListener('click', () => {
        releaseButterflies();
        const btn = document.getElementById('butterflyBtn');
        btn.disabled = true;
        btn.textContent = '🦋 Butterflies Flying! 🦋';
        btn.style.opacity = '0.7';
    });
    
    // Raycaster for candle blowing
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('click', (event) => {
        if (candlesBlown) return;
        
        mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(flamesList);
        
        if (intersects.length > 0) {
            blowCandles();
        }
    });
    
    // --- Animation Loop ---
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.012;
        
        cakeGroup.rotation.y = Math.sin(time * 0.18) * 0.04;
        cakeGroup.position.y = Math.sin(time * 1.2) * 0.006;
        floatingTitle.position.y = 3.35 + Math.sin(time * 1.4) * 0.012;
        starsField.rotation.y += 0.001;
        
        // Animate flames
        if (!candlesBlown) {
            flamesList.forEach((flame, idx) => {
                flame.scale.setScalar(0.85 + Math.sin(time * 18 + idx) * 0.2);
            });
        }
        
        // Animate butterflies
        butterflies.forEach(butterfly => {
            butterfly.angle += butterfly.speed;
            butterfly.mesh.position.x = Math.cos(butterfly.angle) * butterfly.radius;
            butterfly.mesh.position.z = Math.sin(butterfly.angle) * butterfly.radius;
            butterfly.mesh.position.y = 1.2 + Math.sin(time * 3 + butterfly.angle) * 0.3;
            // Flapping wings
            butterfly.wingAngle = Math.sin(time * 12) * 0.8;
            if (butterfly.mesh.children[0]) butterfly.mesh.children[0].rotation.z = -0.5 + butterfly.wingAngle * 0.5;
            if (butterfly.mesh.children[1]) butterfly.mesh.children[1].rotation.z = 0.5 - butterfly.wingAngle * 0.5;
        });
        
        camera.position.x = 5.5 + Math.sin(time * 0.12) * 0.12;
        camera.lookAt(0, 1.6, 0);
        
        effectComposer.render();
        labelRenderer.render(scene, camera);
    }
    
    animate();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        effectComposer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    initMusic();
</script>
</body>
</html>
